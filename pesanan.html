<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pesanan - E-Canteen BLU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

:root{
    --primary:#A1001C;
    --primary-light:#C81D37;
    --background:#F8F7F1;
    --text:#1F2937;
    --muted:#6B7280;
    --border:#E5E7EB;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#2D2D2D;
}

.phone{
    width:390px;
    height:844px;
    background:var(--background);
    overflow:hidden;
    border-radius:35px;
    position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
    display: flex;
    flex-direction: column;
    border: 6px solid #111827; 
}

.header{
    height:140px;
    background:linear-gradient(
    135deg,
    var(--primary),
    var(--primary-light)
    );
    padding-top:50px;
    position:relative;
    flex-shrink: 0;
}

.header::before{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    right:-50px;
    top:-50px;
}

.page-title{
    text-align:center;
    color:white;
    font-size:24px;
    font-weight:700;
    position: relative;
    z-index: 2;
}

.page-subtitle{
    text-align:center;
    color:rgba(255,255,255,.85);
    font-size:13px;
    margin-top:4px;
    position: relative;
    z-index: 2;
}

.content{
    flex: 1;
    overflow-y:auto;
    padding:20px;
    /* Ruang agar konten tidak tertutup navigasi bawah 75px */
    padding-bottom: 95px; 
}

.content::-webkit-scrollbar{
    display:none;
}

/* CARD PESANAN */

.order-card{
    background:white;
    border-radius:20px;
    padding:18px;
    margin-bottom:16px;
    border: 1.5px solid #374151; 
    box-shadow:0 4px 12px rgba(0,0,0,.03);
}

.order-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
}

.order-id{
    font-size:15px;
    font-weight: 700;
    color:var(--text);
}

.status{
    padding:6px 14px;
    border-radius:20px;
    font-size:11px;
    font-weight:700; 
}

/* STATUS COLORS */
.dipesan{
    background:#E0F2FE;
    color:#0369A1;
}

.disiapkan{
    background:#FEF3C7;
    color:#B45309;
}

.siap{
    background:#DCFCE7;
    color:#15803D;
}

.time{
    font-size:13px;
    color:var(--muted);
    margin-bottom: 18px;
}

.detail-btn{
    width: 100%;
    border:none;
    background:var(--primary);
    color:white;
    padding:14px 16px;
    border-radius:14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    text-align: center;
    transition: 0.3s;
}

.detail-btn:hover {
    background: var(--primary-light);
}

/* BOTTOM NAV (DISAMAKAN DENGAN HOME) */
.bottom-nav{
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    height:75px;
    background:#D9D9D9;
    display:flex; 
    z-index:100;
    border-top: 1px solid #B0B0B0;
}

.nav-item{
    flex: 1; 
    height: 100%; 
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center; 
    gap:4px;
    cursor:pointer;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
}

.nav-item:active {
    background: rgba(0, 0, 0, 0.1); 
}

.icon-wrapper {
    position: relative;
    display: inline-block;
}

.nav-item i{
    font-size:24px;
    color:#000;
}

.nav-badge {
    position: absolute;
    top: -4px;
    right: -8px;
    background: var(--primary);
    color: white;
    font-size: 10px;
    font-weight: 700;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 2px solid #D9D9D9;
}

.nav-item span{
    font-size:12px;
    color:#000;
}

.nav-item.active i,
.nav-item.active span{
    color:var(--primary);
    font-weight:600;
}

@media(max-width:420px){
    body{
        background:var(--background);
    }
    .phone{
        width:100%;
        height:100vh;
        border-radius:0;
        border: none; 
    }
}

</style>
</head>

<body>

<div class="phone">

    <div class="header">
        <div class="page-title">Pesanan</div>
        <div class="page-subtitle">Pantau seluruh pesanan Anda</div>
    </div>

    <div class="content">

        <div class="order-card">
            <div class="order-top">
                <div class="order-id">#ORD240001</div>
                <div class="status dipesan">Dipesan</div>
            </div>
            
            <div class="time">13 Juni 2026 • 12:30 WIB</div>
            
            <button class="detail-btn" onclick="window.location.href='status_pesanan.html'">
                Lihat Detail
            </button>
        </div>

        <div class="order-card">
            <div class="order-top">
                <div class="order-id">#ORD240002</div>
                <div class="status disiapkan">Disiapkan</div>
            </div>
            
            <div class="time">13 Juni 2026 • 11:20 WIB</div>
            
            <button class="detail-btn" onclick="window.location.href='status_pesanan.html'">
                Lihat Detail
            </button>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='beranda.html'">
            <i class="bi bi-house-fill"></i>
            <span>Home</span>
        </div>

        <div class="nav-item active" onclick="window.location.href='pesanan.html'">
            <div class="icon-wrapper">
                <i class="bi bi-basket"></i>
                <div class="nav-badge">2</div>
            </div>
            <span>Pesanan</span>
        </div>

        <div class="nav-item" onclick="window.location.href='riwayat.html'">
            <i class="bi bi-receipt-cutoff"></i>
            <span>Transaksi</span>
        </div>

        <div class="nav-item" onclick="window.location.href='profil.html'">
            <i class="bi bi-person-circle"></i>
            <span>Profil</span>
        </div>
    </div>

</div>

</body>
</html>
