<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pembayaran - E-Canteen BLU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
:root{
    --primary: #A1001C;
    --primary-light: #C81D37;
    --background: #FCFBF4; 
    --text: #1F2937;
    --muted: #6B7280;
    --border: #E5E7EB;
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #2D2D2D;
}

.phone{
    width: 390px;
    height: 844px;
    background: var(--background);
    overflow: hidden;
    position: relative;
    border-radius: 35px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
}

/* HEADER */
.header{
    height: 140px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    position: relative;
    padding-top: 45px;
}

.header::before{
    content: "";
    position: absolute;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,.08);
    right: -50px;
    top: -50px;
}

.back-btn{
    position: absolute;
    top: 45px;
    left: 20px;
    width: 42px;
    height: 42px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,.15);
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
}

.page-title{
    text-align: center;
    color: white;
    font-size: 20px;
    font-weight: 700;
}

.page-subtitle{
    text-align: center;
    color: rgba(255,255,255,.85);
    font-size: 12px;
    margin-top: 2px;
}

/* CONTENT */
.content{
    height: calc(100% - 140px - 90px); /* Disesuaikan agar tak tertutup tombol bayar */
    overflow-y: auto;
    padding: 25px 20px;
}

.content::-webkit-scrollbar{
    display: none;
}

.section-title{
    font-size: 16px;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 12px;
}

/* CARD CONTAINER (Payment Methods) */
.card{
    background: white;
    border-radius: 16px;
    padding: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,.03);
    margin-bottom: 25px;
}

/* PAYMENT OPTIONS */
.payment-option{
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: white;
}

.payment-option:last-child{
    margin-bottom: 0;
}

.payment-option.active{
    border-color: var(--primary);
    background: rgba(161, 0, 28, 0.03);
}

.payment-icon{
    font-size: 22px;
    color: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
}

.payment-info{
    flex: 1;
}

.payment-name{
    font-size: 14px;
    font-weight: 600;
    color: #2c3e50;
}

.payment-balance{
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
}

/* CUSTOM RADIO BUTTON */
.payment-option input[type="radio"] {
    display: none;
}

.custom-radio {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid #A0AEC0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
}

.payment-option.active .custom-radio {
    border-color: var(--primary);
}

.payment-option.active .custom-radio::after {
    content: "";
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--primary);
}

/* VOUCHER KANTIN */
.voucher-section{
    margin-bottom: 25px;
}

.voucher-title{
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
}

.voucher-group{
    display: flex;
    gap: 10px;
}

.voucher-input{
    flex: 1;
    height: 42px;
    border: 1px solid #A3A3A3;
    border-radius: 4px;
    padding: 0 12px;
    font-size: 13px;
    outline: none;
    background: white;
}

.voucher-input::placeholder{
    color: #9CA3AF;
}

.voucher-btn{
    height: 42px;
    padding: 0 16px;
    background: #737373;
    color: white;
    border: 1px solid #525252;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
}

.voucher-btn:hover{
    background: #525252;
}

/* RINCIAN PEMBAYARAN */
.rincian-card{
    background: transparent;
    border: 1px solid #A3A3A3;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 30px;
}

.rincian-title{
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
}

.rincian-row{
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 6px;
}

.rincian-divider{
    height: 1px;
    background: #D1D5DB;
    margin: 12px 0;
}

.rincian-total{
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 0;
}

/* BOTTOM BUTTON */
.bottom-pay{
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    background: white;
    padding: 20px;
    border-top: 1px solid #f0f0f0;
}

.total-label{
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 2px;
}

.total-price{
    font-size: 24px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 15px;
}

.pay-btn{
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 12px;
    background: var(--primary);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.pay-btn:hover{
    opacity: 0.95;
}

/* TOAST */
.toast{
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #16A34A;
    color: white;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    visibility: hidden;
    transition: .3s;
    z-index: 9999;
}

.toast.show{
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
}

@media(max-width:420px){
    body{
        background: var(--background);
    }
    .phone{
        width: 100%;
        height: 100vh;
        border-radius: 0;
    }
}
</style>
</head>

<body>

<div id="toast" class="toast">
    Pembayaran berhasil
</div>

<div class="phone">

    <div class="header">
        <button class="back-btn" onclick="history.back()">
            <i class="bi bi-arrow-left"></i>
        </button>
        <div class="page-title">Pembayaran</div>
        <div class="page-subtitle">Pilih Metode Pembayaran</div>
    </div>

    <div class="content">

        <div class="section-title">Metode Pembayaran</div>

        <div class="card">
            <div class="payment-option active" onclick="pilihMetode(this)">
                <div class="payment-icon">
                    <i class="bi bi-wallet2"></i>
                </div>
                <div class="payment-info">
                    <div class="payment-name">Saldo E-Canteen</div>
                    <div class="payment-balance">Saldo: Rp 150.000</div>
                </div>
                <div class="custom-radio"></div>
                <input type="radio" name="metode_bayar" value="saldo" checked>
            </div>

            <div class="payment-option" onclick="pilihMetode(this)">
                <div class="payment-icon">
                    <i class="bi bi-qr-code"></i>
                </div>
                <div class="payment-info">
                    <div class="payment-name">QRIS</div>
                </div>
                <div class="custom-radio"></div>
                <input type="radio" name="metode_bayar" value="qris">
            </div>
        </div>

        <div class="voucher-section">
            <div class="voucher-title">Voucher Kantin</div>
            <div class="voucher-group">
                <input type="text" id="voucherCode" class="voucher-input" placeholder="Masukkan kode voucher..">
                <button class="voucher-btn" onclick="terapkanVoucher()">Pakai</button>
            </div>
        </div>

        <div class="rincian-card">
            <div class="rincian-title">Rincian Pembayaran</div>
            <div class="rincian-row">
                <span>Subtotal</span>
                <span>Rp42.000</span>
            </div>
            <div class="rincian-row">
                <span>Diskon Voucher</span>
                <span id="labelDiskon">-Rp0</span>
            </div>
            <div class="rincian-divider"></div>
            <div class="rincian-row rincian-total">
                <span>Total</span>
                <span id="labelRincianTotal">Rp42.000</span>
            </div>
        </div>

    </div>

    <div class="bottom-pay">  
        <button class="pay-btn" onclick="bayarSekarang()">
            Bayar
        </button>
    </div>

</div>

<script>
// Variabel Harga Default
let subtotal = 42000;
let diskon = 0;

// Fungsi Animasi Pindah Radio Button
function pilihMetode(elemenPilihan) {
    document.querySelectorAll('.payment-option').forEach(el => {
        el.classList.remove('active');
        el.querySelector('input[type="radio"]').checked = false;
    });
    
    elemenPilihan.classList.add('active');
    
    const radioButton = elemenPilihan.querySelector('input[type="radio"]');
    radioButton.checked = true;
}

// Fungsi Format Rupiah
function formatRupiahTanpaSpasi(angka) {
    return 'Rp' + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function formatRupiahDenganSpasi(angka) {
    return 'Rp ' + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

// Fungsi Terapkan Voucher
function terapkanVoucher() {
    const inputKode = document.getElementById('voucherCode').value.trim().toUpperCase();

    // Contoh Logika Voucher (Coba ketik DISKON10)
    if (inputKode === 'DISKON10') {
        diskon = 10000;
        munculkanToast("Voucher berhasil digunakan!", "#16A34A");
    } else if (inputKode === '') {
        diskon = 0;
        munculkanToast("Kode voucher dibatalkan.", "#6B7280");
    } else {
        diskon = 0;
        munculkanToast("Kode voucher tidak valid!", "#DC2626");
    }

    hitungTotal();
}

// Fungsi Menghitung & Mengubah Teks HTML
function hitungTotal() {
    const totalAkhir = subtotal - diskon;

    // Update Text Rincian
    document.getElementById('labelDiskon').innerText = "-Rp" + diskon.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    document.getElementById('labelRincianTotal').innerText = formatRupiahTanpaSpasi(totalAkhir);
}

// Menampilkan Toast
function munculkanToast(pesan, warna) {
    const toast = document.getElementById("toast");
    toast.innerText = pesan;
    toast.style.background = warna;
    toast.classList.add("show");

    setTimeout(()=>{
        toast.classList.remove("show");
    }, 1500);
}

// Bayar
function bayarSekarang(){
    // Dapatkan metode pembayaran yang sedang aktif
    const metodeTerpilih = document.querySelector('input[name="metode_bayar"]:checked').value;

    if (metodeTerpilih === 'saldo') {
        munculkanToast("Pembayaran berhasil!", "#16A34A");
        setTimeout(()=>{
            window.location.href = "struk.html"; // Dialihkan ke struk
        }, 1500);
    } else if (metodeTerpilih === 'qris') {
        munculkanToast("Mengalihkan ke QRIS...", "#16A34A");
        setTimeout(()=>{
            window.location.href = "qris.html"; // Dialihkan ke halaman QRIS
        }, 1500);
    }
}
</script>

</body>
</html>
