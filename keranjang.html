<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keranjang - E-Canteen BLU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
:root{
    --primary:#A1001C;
    --primary-light:#C81D37;
    --background:#F8F7F1;
    --text:#1F2937;
    --muted:#6B7280;
    --border:#E5E7EB;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#2D2D2D;
}

.phone{
    width:390px;
    height:844px;
    background:var(--background);
    overflow:hidden;
    position:relative;
    border-radius:35px;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
}

/* HEADER */
.header{
    height:140px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    position:relative;
    padding-top:45px;
}

.header::before{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    background: rgba(255,255,255,.08);
    right:-50px;
    top:-50px;
}

.back-btn{
    position:absolute;
    top:45px;
    left:20px;
    width:42px;
    height:42px;
    border:none;
    border-radius:12px;
    background: rgba(255,255,255,.15);
    color:white;
    font-size:18px;
    cursor:pointer;
}

.page-title{
    text-align:center;
    color:white;
    font-size:24px;
    font-weight:700;
}

.page-subtitle{
    text-align:center;
    color:rgba(255,255,255,.85);
    font-size:13px;
    margin-top:4px;
}

/* CONTENT */
.content{
    height:calc(100% - 140px);
    overflow-y:auto;
    padding:20px 18px 180px;
}

.content::-webkit-scrollbar{
    display:none;
}

.section-title{
    font-size:18px;
    font-weight:700;
    color:var(--text);
    margin-bottom:15px;
}

@media(max-width:420px){
    body{
        background:var(--background);
    }
    .phone{
        width:100%;
        height:100vh;
        border-radius:0;
    }
}

/* WARUNG GROUP */
.warung-group{
    margin-bottom:22px;
}

.warung-header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding: 0 4px;
}

.warung-name{
    font-size:17px;
    font-weight:700;
    color:var(--primary);
}

.btn-lokasi{
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(161, 0, 28, 0.08);
    color: var(--primary);
    border: none;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

.btn-lokasi:hover{
    background: rgba(161, 0, 28, 0.15);
}

/* ITEM CARD */
.cart-card{
    background:white;
    border-radius:20px;
    padding:16px;
    margin-bottom:12px;
    border:1px solid #E5E7EB;
    box-shadow: 0 4px 12px rgba(0,0,0,.04);
}

.cart-top{
    display:flex;
    gap:14px;
}

.cart-image{
    width:75px;
    height:75px;
    border-radius:16px;
    background:#E5E7EB;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    color:var(--primary);
}

.cart-info{
    flex:1;
}

.menu-name{
    font-size:16px;
    font-weight:700;
    color:var(--text);
}

.menu-price{
    margin-top:4px;
    font-size:15px;
    font-weight:600;
    color:var(--primary);
}

/* INPUT CATATAN YANG BISA DIEDIT */
.menu-note-input{
    display:block;
    width:100%;
    margin-top:8px;
    background:#F9FAFB;
    border:1px solid #E5E7EB;
    border-radius:10px;
    padding:8px 10px;
    font-size:12px;
    color:var(--text);
    outline:none;
    transition: .2s;
}

.menu-note-input:focus{
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(161, 0, 28, 0.08);
}

.menu-note-input::placeholder{
    color: var(--muted);
    font-style: italic;
}

.cart-bottom{
    margin-top:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* QTY */
.qty-box{
    display:flex;
    align-items:center;
    gap:12px;
}

.qty-btn{
    width:34px;
    height:34px;
    border:none;
    border-radius:10px;
    background:#E5E7EB;
    cursor:pointer;
    font-size:18px;
    font-weight:700;
}

.qty-value{
    font-size:17px;
    font-weight:700;
    min-width:20px;
    text-align:center;
}

/* DELETE */
.delete-btn{
    border:none;
    background:none;
    color:#DC2626;
    font-size:20px;
    cursor:pointer;
}

/* SUMMARY */
.summary-card{
    background:white;
    border-radius:20px;
    padding:18px;
    border:1px solid #E5E7EB;
    box-shadow: 0 4px 12px rgba(0,0,0,.04);
    margin-top:10px;
}

.summary-title{
    font-size:18px;
    font-weight:700;
    color:var(--text);
    margin-bottom:15px;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    font-size:14px;
}

.summary-row:last-child{
    margin-bottom:0;
}

.summary-label{
    color:var(--muted);
}

.summary-value{
    font-weight:600;
    color:var(--text);
}

.summary-divider{
    height:1px;
    background:#E5E7EB;
    margin:15px 0;
}

.total-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.total-label{
    font-size:16px;
    font-weight:700;
    color:var(--text);
}

.total-value{
    font-size:28px;
    font-weight:700;
    color:var(--primary);
}

/* BOTTOM CHECKOUT */
.bottom-checkout{
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    background:white;
    padding:15px 20px 25px;
    box-shadow: 0 -5px 20px rgba(0,0,0,.08);
    border-top: 1px solid #E5E7EB;
}

.checkout-info{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}

.checkout-label{
    font-size:13px;
    color:var(--muted);
}

.checkout-total{
    font-size:26px;
    font-weight:700;
    color:var(--primary);
}

.checkout-btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:16px;
    background:var(--primary);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.checkout-btn:hover{
    opacity:.95;
}

.checkout-btn:disabled{
    background:var(--muted);
    cursor:not-allowed;
    opacity:0.7;
}

/* TOAST */
.toast{
    position:fixed;
    top:30px;
    left:50%;
    transform: translateX(-50%) translateY(-20px);
    background:#16A34A;
    color:white;
    padding:14px 18px;
    border-radius:12px;
    font-size:14px;
    font-weight:500;
    opacity:0;
    visibility:hidden;
    transition:.3s;
    z-index:9999;
}

.toast.show{
    opacity:1;
    visibility:visible;
    transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<div class="phone">

    <div class="header">
        <button class="back-btn" onclick="history.back()">
            <i class="bi bi-arrow-left"></i>
        </button>
        <div class="page-title">Keranjang</div>
        <div class="page-subtitle">Periksa pesanan Anda</div>
    </div>

    <div class="content">
        <div class="section-title">Item Pesanan</div>

        <div class="warung-group">
            <div class="warung-header">
                <div class="warung-name">Warung Bu Sari</div>
                <button class="btn-lokasi" onclick="cekLokasi('Warung Bu Sari')">
                    <i class="bi bi-geo-alt-fill"></i> Lokasi
                </button>
            </div>
            
            <div class="cart-card">
                <div class="cart-top">
                    <div class="cart-image">
                        <i class="bi bi-egg-fried"></i>
                    </div>
                    <div class="cart-info">
                        <div class="menu-name">Nasi Goreng</div>
                        <div class="menu-price">Rp 15.000</div>
                        <input type="text" class="menu-note-input" placeholder="(catatan)" value="Tidak pedas, sambal dipisah">
                    </div>
                </div>
                <div class="cart-bottom">
                    <div class="qty-box">
                        <button class="qty-btn" onclick="ubahQty(this, -1)">-</button>
                        <div class="qty-value">2</div>
                        <button class="qty-btn" onclick="ubahQty(this, 1)">+</button>
                    </div>
                    <button class="delete-btn" onclick="hapusItem(this, 'Nasi Goreng')">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="warung-group">
            <div class="warung-header">
                <div class="warung-name">Warung Pak Budi</div>
                <button class="btn-lokasi" onclick="cekLokasi('Warung Pak Budi')">
                    <i class="bi bi-geo-alt-fill"></i> Lokasi
                </button>
            </div>

            <div class="cart-card">
                <div class="cart-top">
                    <div class="cart-image">
                        <i class="bi bi-cup-hot"></i>
                    </div>
                    <div class="cart-info">
                        <div class="menu-name">Bakso</div>
                        <div class="menu-price">Rp 12.000</div>
                        <input type="text" class="menu-note-input" placeholder="(catatan)" value="">
                    </div>
                </div>
                <div class="cart-bottom">
                    <div class="qty-box">
                        <button class="qty-btn" onclick="ubahQty(this, -1)">-</button>
                        <div class="qty-value">1</div>
                        <button class="qty-btn" onclick="ubahQty(this, 1)">+</button>
                    </div>
                    <button class="delete-btn" onclick="hapusItem(this, 'Bakso')">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="summary-card">
            <div class="summary-title">Ringkasan Belanja</div>
            <div class="summary-row">
                <div class="summary-label">Total Item</div>
                <div class="summary-value" id="summary-items">3 Item</div>
            </div>
            <div class="summary-row">
                <div class="summary-label">Subtotal</div>
                <div class="summary-value" id="summary-subtotal">Rp 42.000</div>
            </div>
            <div class="summary-divider"></div>
            <div class="total-row">
                <div class="total-label">Total Bayar</div>
                <div class="total-value" id="summary-total">Rp 42.000</div>
            </div>
        </div>

    </div>

    <div class="toast" id="toast">Berhasil</div>

    <div class="bottom-checkout">
        <div class="checkout-info">
            <div>
                <div class="checkout-label">Total Pembayaran</div>
                <div class="checkout-total" id="checkoutTotal">Rp 42.000</div>
            </div>
        </div>
        <button class="checkout-btn" id="btn-checkout" onclick="checkout()">Lanjut Checkout</button>
    </div>

</div>

<script>
// Fungsi menampilkan toast
function showToast(message){
    const toast = document.getElementById("toast");
    toast.innerHTML = message;
    toast.classList.add("show");
    setTimeout(()=>{
        toast.classList.remove("show");
    }, 1500);
}

// Fungsi tombol lokasi
function cekLokasi(namaWarung) {
    showToast("Membuka lokasi " + namaWarung + "...");
    // Di sini bisa ditambahkan URL redirect ke maps/halaman lokasi warung
}

// Fungsi checkout
function checkout(){
    showToast("Menuju halaman checkout...");
    setTimeout(()=>{
        // window.location.href = "checkout.html";
    }, 1000);
}

// Fungsi memformat angka menjadi format Rupiah
function formatRupiah(angka) {
    return 'Rp ' + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

// Fungsi menghitung ulang total belanja
function updateCart() {
    const cartCards = document.querySelectorAll('.cart-card');
    let totalItem = 0;
    let totalPrice = 0;

    cartCards.forEach(card => {
        const priceText = card.querySelector('.menu-price').innerText;
        const price = parseInt(priceText.replace(/[^0-9]/g, ''));
        const qty = parseInt(card.querySelector('.qty-value').innerText);

        totalItem += qty;
        totalPrice += (price * qty);
    });

    document.getElementById('summary-items').innerText = totalItem + " Item";
    document.getElementById('summary-subtotal').innerText = formatRupiah(totalPrice);
    document.getElementById('summary-total').innerText = formatRupiah(totalPrice);
    document.getElementById('checkoutTotal').innerText = formatRupiah(totalPrice);

    const checkoutBtn = document.getElementById('btn-checkout');
    if (totalItem === 0) {
        checkoutBtn.disabled = true;
        checkoutBtn.innerText = "Keranjang Kosong";
    } else {
        checkoutBtn.disabled = false;
        checkoutBtn.innerText = "Lanjut Checkout";
    }
}

// Fungsi tambah kurang jumlah (+/-)
function ubahQty(btn, delta) {
    const qtyElement = btn.parentElement.querySelector('.qty-value');
    let currentQty = parseInt(qtyElement.innerText);
    let newQty = currentQty + delta;

    if (newQty < 1) return; 

    qtyElement.innerText = newQty;
    updateCart();
}

// Fungsi hapus item
function hapusItem(btn, namaMenu) {
    const card = btn.closest('.cart-card');
    const group = btn.closest('.warung-group');

    card.remove();

    if (group.querySelectorAll('.cart-card').length === 0) {
        group.remove();
    }

    showToast(namaMenu + " dihapus dari keranjang");
    updateCart();
}

window.onload = updateCart;
</script>

</body>
</html>
