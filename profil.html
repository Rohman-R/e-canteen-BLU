<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil - E-Canteen BLU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

:root{
    --primary:#A1001C;
    --primary-light:#C81D37;
    --background:#F8F7F1;
    --text:#1F2937;
    --muted:#6B7280;
    --border-dark: #374151; /* Warna border abu gelap untuk garis tepian yang tegas */
    --border-light: #D9D9D9;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#2D2D2D;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CONTAINER HP */
.phone{
    width:390px;
    height:844px;
    background:var(--background);
    overflow:hidden;
    position:relative;
    border-radius:35px;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
    border: 2px solid #555;
}

/* HEADER */
.header{
    background:linear-gradient(
    135deg,
    var(--primary),
    var(--primary-light)
    );
    height:220px;
    position:relative;
}

.header::before{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    right:-50px;
    top:-50px;
    pointer-events: none;
}

.profile-area{
    position:absolute;
    bottom:-55px;
    width:100%;
    text-align:center;
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:white;
    object-fit:cover;
    /* Tambahan garis tepi pada foto profil */
    border: 5px solid white;
    box-shadow: 0 0 0 1.5px var(--border-dark);
}

/* CONTENT AREA */
.content{
    height:calc(100% - 295px); 
    overflow-y:auto;
    padding:75px 20px 20px; 
}

.content::-webkit-scrollbar{
    display:none;
}

.name{
    text-align:center;
    font-size:22px;
    font-weight:700;
    color:var(--text);
}

.email{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    margin-top:5px;
    margin-bottom:20px;
}

/* TOMBOL EDIT PROFIL (Diberi garis tepian gelap) */
.edit-btn{
    width:100%;
    height:50px;
    border-radius:14px;
    background:var(--primary);
    color:white;
    font-weight:600;
    cursor:pointer;
    margin-bottom:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    transition: 0.3s;
    /* Garis tepi */
    border: 1.5px solid var(--border-dark);
}

.edit-btn:hover {
    background: var(--primary-light);
}

/* KOTAK MENU (Diberi garis tepian tegas) */
.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    margin-bottom:18px;
    /* Garis tepi kotak menu */
    border: 1.5px solid var(--border-dark); 
    box-shadow: 0 4px 12px rgba(0,0,0,.03);
}

.menu-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px;
}

.menu-left{
    display:flex;
    align-items:center;
    gap:14px;
}

.icon{
    width:42px;
    height:42px;
    border-radius:12px;
    background:#F3F4F6;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18px;
    color:var(--primary);
    /* Garis tepi dalam ikon */
    border: 1px solid var(--border-light);
}

.menu-title{
    font-size:15px;
    font-weight:600;
    color:var(--text);
}

.menu-sub{
    font-size:12px;
    color:var(--muted);
}

.switch{
    position:relative;
    width:50px;
    height:28px;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    cursor:pointer;
    inset:0;
    background:#D1D5DB;
    border-radius:50px;
    transition:.3s;
    border: 1px solid #9CA3AF; /* Garis tepi slider switch */
}

.slider:before{
    content:"";
    position:absolute;
    width:22px;
    height:22px;
    left:2px;
    top:2px;
    background:white;
    border-radius:50%;
    transition:.3s;
    box-shadow: 0 2px 4px rgba(0,0,0,.2);
}

input:checked + .slider{
    background:var(--primary);
    border-color: var(--border-dark);
}

input:checked + .slider:before{
    transform:translateX(22px);
}

/* TOMBOL LOGOUT (Diberi garis tepian merah tua) */
.logout-btn{
    width:100%;
    height:50px;
    border-radius:14px;
    background:#FEE2E2;
    color:#DC2626;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    transition: 0.3s;
    /* Garis tepi */
    border: 1.5px solid #991B1B;
}

.logout-btn:hover {
    background: #FCC5C5;
}

/* BOTTOM NAV */
.bottom-nav{
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    height:75px;
    background:#D9D9D9;
    display:flex; 
    z-index:100;
    border-top: 1px solid #B0B0B0;
}

.nav-item{
    flex: 1; 
    height: 100%; 
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center; 
    gap:4px;
    cursor:pointer;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
}

.nav-item:active {
    background: rgba(0, 0, 0, 0.1); 
}

.icon-wrapper {
    position: relative;
    display: inline-block;
}

.nav-item i{
    font-size:24px;
    color:#000;
}

.nav-badge {
    position: absolute;
    top: -4px;
    right: -8px;
    background: var(--primary);
    color: white;
    font-size: 10px;
    font-weight: 700;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 2px solid #D9D9D9;
}

.nav-item span{
    font-size:12px;
    color:#000;
}

.nav-item.active i,
.nav-item.active span{
    color:var(--primary);
    font-weight:600;
}

@media(max-width:420px){
    body{
        background:var(--background);
    }
    .phone{
        width:100%;
        height:100vh;
        border-radius:0;
        box-shadow:none;
        border: none;
    }
}

</style>
</head>

<body>

<div class="phone">

    <div class="header">
        <div class="profile-area">
            <img class="avatar" src="https://i.pravatar.cc/300" alt="Profile">
        </div>
    </div>

    <div class="content">

        <div class="name">Muhammad Rizky</div>
        <div class="email">user@email.com</div> 
        
        <button class="edit-btn" onclick="window.location.href='edit-profil.html'">
            <i class="bi bi-pencil-square"></i> Edit Profil
        </button>

        <div class="card">
            <div class="menu-item">
                <div class="menu-left">
                    <div class="icon">
                        <i class="bi bi-code-slash"></i>
                    </div>
                    <div>
                        <div class="menu-title">Mode Pengembangan</div>
                        <div class="menu-sub">Aktifkan fitur developer</div>
                    </div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="devMode">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i> Keluar Akun
        </button>

    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='beranda.html'">
            <i class="bi bi-house-fill"></i>
            <span>Home</span>
        </div>

        <div class="nav-item" onclick="window.location.href='pesanan.html'">
            <div class="icon-wrapper">
                <i class="bi bi-basket"></i>
                <div class="nav-badge">2</div>
            </div>
            <span>Pesanan</span>
        </div>

        <div class="nav-item" onclick="window.location.href='riwayat.html'">
            <i class="bi bi-receipt-cutoff"></i>
            <span>Transaksi</span>
        </div>

        <div class="nav-item active" onclick="window.location.href='profil.html'">
            <i class="bi bi-person-circle"></i>
            <span>Profil</span>
        </div>
    </div>

</div>

<script>
function logout(){
    if(confirm("Yakin ingin keluar akun?")){
        window.location.href = "login.html";
    }
}

document.getElementById("devMode").addEventListener("change", function(){
    if(this.checked){
        alert("Mode Pengembangan Aktif");
    }else{
        alert("Mode Pengembangan Nonaktif");
    }
});
</script>

</body>
</html>
