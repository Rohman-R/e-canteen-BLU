<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registrasi - E-Canteen BLU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

:root{
    --primary:#A1001C;
    --primary-light:#C81D37;
    --background:#F8F7F1;
    --text:#1F2937;
    --muted:#6B7280;
    --border:#E5E7EB;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#2D2D2D;
}

.phone{
    width:390px;
    height:844px;

    background:var(--background);

    position:relative;

    border-radius:35px;

    overflow-y:auto;
    overflow-x:hidden;

    scrollbar-width:none;

    box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.phone::-webkit-scrollbar{
    display:none;
}

.header{
    height:130px;

    background:
    linear-gradient(
        135deg,
        var(--primary),
        var(--primary-light)
    );

    border-bottom-left-radius:40px;
    border-bottom-right-radius:40px;

    position:relative;
}

.header::before{
    content:"";
    position:absolute;

    width:180px;
    height:180px;

    border-radius:50%;

    background:
    rgba(255,255,255,.08);

    right:-50px;
    top:-50px;
}

.back-btn{
    position:absolute;
    top:50px;
    left:25px;

    width:42px;
    height:42px;

    border:none;
    border-radius:12px;

    background:
    rgba(255,255,255,.15);

    color:white;

    cursor:pointer;

    font-size:18px;
}

.content{

    min-height:calc(100vh - 130px);

    display:flex;

    justify-content:center;

    align-items:center;

    padding:16px;

    margin-top:-20px;

    animation:slideUp .8s ease;
}

.card{
    background:white;

    border-radius:24px;

    padding:28px 24px;

    width:100%;

    box-shadow:
    0 10px 30px rgba(0,0,0,.06);
}

.title{
    text-align:center;
    margin-bottom:24px;
}

.title h2{
    color:var(--text);
    font-size:24px;
    margin-bottom:6px;
}

.title p{
    color:var(--muted);
    font-size:14px;
}

.form-group{
    margin-bottom:16px;
}

.label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:500;
    color:var(--text);
}

.input-wrapper{
    position:relative;
}

.input{
    width:100%;
    height:52px;

    border:1px solid var(--border);

    border-radius:16px;

    padding:0 18px;

    font-size:14px;

    outline:none;

    transition:.3s;
}

.input:focus{
    border-color:var(--primary);
}

.password-toggle{
    position:absolute;

    right:18px;
    top:50%;

    transform:translateY(-50%);

    cursor:pointer;

    color:#888;
}

.error-box{
    display:none;

    margin-bottom:18px;

    background:#FFF0F0;

    color:#D62828;

    padding:12px 16px;

    border-radius:12px;

    font-size:13px;
}

.success-box{
    display:none;

    margin-bottom:18px;

    background:#ECFDF3;

    color:#16A34A;

    padding:12px 16px;

    border-radius:12px;

    font-size:13px;
}

.register-btn{

    width:100%;
    height:54px;

    border:none;

    border-radius:18px;

    background:var(--primary);

    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    box-shadow:
    0 12px 25px rgba(161,0,28,.20);
}

.login-link{

    text-align:center;

    margin-top:18px;
}

.login-link a{

    color:var(--primary);

    font-weight:600;

    text-decoration:none;
}

@keyframes slideUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:420px){

    body{
        background:var(--background);
    }

    .phone{

        width:100%;
        height:100vh;

        border-radius:0;

        overflow-y:auto;
    }

}

</style>
</head>

<body>

<div class="phone">

    <div class="header">

        <button
        class="back-btn"
        onclick="window.location.href='welcome.html'">

            <i class="bi bi-arrow-left"></i>

        </button>

    </div>

    <div class="content">

        <div class="card">

            <div class="title">

                <h2>Buat Akun Baru</h2>

                <p>
                    Daftar untuk menggunakan E-Canteen BLU
                </p>

            </div>

            <div class="error-box" id="errorBox"></div>

            <div class="success-box" id="successBox">
                Registrasi berhasil. Mengarahkan ke OTP...
            </div>

            <div class="form-group">

                <label class="label">Nama Lengkap</label>

                <input
                type="text"
                id="nama"
                class="input"
                placeholder="Masukkan nama lengkap">

            </div>

            <div class="form-group">

                <label class="label">Email Mahasiswa</label>

                <input
                type="email"
                id="email"
                class="input"
                placeholder="nama@student.budiluhur.ac.id">

            </div>

            <div class="form-group">

                <label class="label">Password</label>

                <div class="input-wrapper">

                    <input
                    type="password"
                    id="password"
                    class="input"
                    placeholder="Minimal 8 karakter">

                    <span
                    class="password-toggle"
                    onclick="togglePassword('password','eye1')">

                        <i
                        class="bi bi-eye"
                        id="eye1"></i>

                    </span>

                </div>

            </div>

            <div class="form-group">

                <label class="label">
                    Konfirmasi Password
                </label>

                <div class="input-wrapper">

                    <input
                    type="password"
                    id="confirmPassword"
                    class="input"
                    placeholder="Ulangi password">

                    <span
                    class="password-toggle"
                    onclick="togglePassword('confirmPassword','eye2')">

                        <i
                        class="bi bi-eye"
                        id="eye2"></i>

                    </span>

                </div>

            </div>

            <button
            class="register-btn"
            onclick="register()">

                Daftar

            </button>

            <div class="login-link">

                Sudah punya akun?

                <a href="login.html">
                    Masuk
                </a>

            </div>

        </div>

    </div>

</div>

<script>

function togglePassword(inputId, iconId){

    const input =
    document.getElementById(inputId);

    const icon =
    document.getElementById(iconId);

    if(input.type === "password"){

        input.type = "text";

        icon.classList.replace(
        "bi-eye",
        "bi-eye-slash"
        );

    }else{

        input.type = "password";

        icon.classList.replace(
        "bi-eye-slash",
        "bi-eye"
        );
    }
}

function showError(message){

    document.getElementById(
    'successBox'
    ).style.display = 'none';

    const errorBox =
    document.getElementById(
    'errorBox'
    );

    errorBox.style.display =
    'block';

    errorBox.innerHTML =
    message;
}

function register(){

    const nama =
    document.getElementById(
    'nama'
    ).value.trim();

    const email =
    document.getElementById(
    'email'
    ).value.trim().toLowerCase();

    const password =
    document.getElementById(
    'password'
    ).value;

    const confirmPassword =
    document.getElementById(
    'confirmPassword'
    ).value;

    if(
        nama === "" ||
        email === "" ||
        password === "" ||
        confirmPassword === ""
    ){

        showError(
        "Semua field wajib diisi."
        );

        return;
    }

    if(
    !email.endsWith(
    "@student.budiluhur.ac.id"
    )){

        showError(
        "Gunakan email mahasiswa dengan domain @student.budiluhur.ac.id"
        );

        return;
    }

    if(password.length < 8){

        showError(
        "Password minimal 8 karakter."
        );

        return;
    }

    if(password !== confirmPassword){

        showError(
        "Konfirmasi password tidak cocok."
        );

        return;
    }

    document.getElementById(
    'errorBox'
    ).style.display='none';

    document.getElementById(
    'successBox'
    ).style.display='block';

    setTimeout(() => {

        window.location.href =
        "otp.html";

    }, 1500);
}

</script>

</body>
</html>
