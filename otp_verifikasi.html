<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verifikasi OTP - E-Canteen BLU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

:root{
    --primary:#A1001C;
    --primary-light:#C81D37;
    --background:#F8F7F1;
    --text:#1F2937;
    --muted:#6B7280;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#2D2D2D;
}

.phone{
    width:390px;
    height:844px;
    background:var(--background);
    position:relative;
    overflow:hidden;
    border-radius:35px;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.header{

    height:130px;

    background:
    linear-gradient(
        135deg,
        var(--primary),
        var(--primary-light)
    );

    border-bottom-left-radius:40px;
    border-bottom-right-radius:40px;

    position:relative;
}

.header::before{

    content:"";

    position:absolute;

    width:180px;
    height:180px;

    border-radius:50%;

    background:
    rgba(255,255,255,.08);

    right:-50px;
    top:-50px;
}

.back-btn{

    position:absolute;

    top:50px;
    left:25px;

    width:42px;
    height:42px;

    border:none;

    border-radius:12px;

    background:
    rgba(255,255,255,.15);

    color:white;

    cursor:pointer;

    font-size:18px;
}

.content{

    min-height:calc(100vh - 150px);

    display:flex;
    justify-content:center;
    align-items:center;

    padding:16px;

    margin-top:-20px;

    animation:slideUp .8s ease;
}

.card{

    width:100%;

    background:white;

    border-radius:24px;

    padding:28px 24px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.06);

    text-align:center;
}

.icon{

    width:80px;
    height:80px;

    margin:0 auto 18px;

    border-radius:50%;

    background:#FFF1F2;

    display:flex;
    justify-content:center;
    align-items:center;

    color:var(--primary);

    font-size:34px;
}

.title{

    font-size:24px;
    font-weight:700;

    color:var(--text);

    margin-bottom:8px;
}

.subtitle{

    font-size:14px;

    color:var(--muted);

    line-height:1.6;

    margin-bottom:24px;
}

.otp-container{

    display:flex;

    justify-content:center;

    gap:10px;

    margin-bottom:20px;
}

.otp-input{

    width:50px;
    height:58px;

    border:2px solid #000;

    border-radius:14px;

    text-align:center;

    font-size:20px;
    font-weight:600;

    color:#1F2937;

    background:#FFF;

    outline:none;

    transition:.3s;
}

.otp-input:focus{

    border:2px solid var(--primary);

    box-shadow:
    0 0 0 3px rgba(161,0,28,.15);
}
.timer{

    color:var(--primary);

    font-weight:600;

    margin-bottom:15px;
}

.resend{

    font-size:14px;

    margin-bottom:24px;
}

.resend button{

    width:100%;

    height:48px;

    border:none;

    border-radius:14px;

    background:#D1D5DB;

    color:#6B7280;

    font-weight:600;

    cursor:not-allowed;

    transition:.3s;
}

.resend button.active{

    background:var(--primary);

    color:white;

    cursor:pointer;
}

.verify-btn{

    width:100%;
    height:54px;

    border:none;

    border-radius:18px;

    background:var(--primary);

    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;
}

.error-box{

    display:none;

    margin-bottom:18px;

    background:#FFF0F0;

    color:#D62828;

    padding:12px;

    border-radius:12px;

    font-size:13px;
}

.success-box{

    display:none;

    margin-bottom:18px;

    background:#ECFDF3;

    color:#16A34A;

    padding:12px;

    border-radius:12px;

    font-size:13px;
}

.toast-success{

    position:fixed;

    top:80px;
    left:50%;

    transform:
    translateX(-50%)
    translateY(-20px);

    background:#16A34A;

    color:white;

    padding:14px 20px;

    border-radius:14px;

    display:flex;
    align-items:center;
    gap:10px;

    font-size:14px;
    font-weight:500;

    box-shadow:
    0 10px 25px rgba(22,163,74,.25);

    opacity:0;
    visibility:hidden;

    transition:.3s;

    z-index:9999;
}

.toast-success.show{

    opacity:1;

    visibility:visible;

    transform:
    translateX(-50%)
    translateY(0);
}

.toast-success i{
    font-size:18px;
}

@keyframes slideUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:420px){

    body{
        background:var(--background);
    }

    .phone{
        width:100%;
        height:100vh;
        border-radius:0;
    }

}

</style>
</head>
<body>

<div id="toastSuccess" class="toast-success">

    <i class="bi bi-check-circle-fill"></i>

    <span id="toastMessage">
        OTP berhasil dikirim ulang
    </span>

</div>

<div id="toastSuccess" class="toast-success">

    <i class="bi bi-check-circle-fill"></i>

    <span id="toastMessage">
        OTP baru berhasil dikirim.
    </span>

</div>

<div class="phone">

    <div class="header">

        <button
        class="back-btn"
        onclick="window.location.href='register.html'">

            <i class="bi bi-arrow-left"></i>

        </button>

    </div>

    <div class="content">

        <div class="card">

            <div class="icon">
                <i class="bi bi-shield-check"></i>
            </div>

            <div class="title">
                Verifikasi OTP
            </div>

            <div class="subtitle">
                Masukkan kode OTP yang telah dikirim ke email mahasiswa Anda.
            </div>

            <div class="error-box" id="errorBox"></div>

            <div class="success-box" id="successBox">
                Verifikasi berhasil. Mengarahkan ke Login...
            </div>

            <div class="success-box" id="resendSuccessBox">
                OTP baru berhasil dikirim.
            </div>

            <div class="otp-container">

                <input class="otp-input" maxlength="1">
                <input class="otp-input" maxlength="1">
                <input class="otp-input" maxlength="1">
                <input class="otp-input" maxlength="1">
                <input class="otp-input" maxlength="1">
                <input class="otp-input" maxlength="1">

            </div>

            <div class="timer" id="timer">
                01:00
            </div>

            <div class="resend">

                <button
                id="resendBtn"
                disabled>

                    Kirim Ulang OTP

                </button>

            </div>

            <button
            class="verify-btn"
            onclick="verifyOTP()">

                Verifikasi

            </button>

        </div>

    </div>

</div>

<script>

const inputs =
document.querySelectorAll('.otp-input');

inputs.forEach((input,index)=>{

    input.addEventListener('input',()=>{

        if(
            input.value.length === 1 &&
            index < inputs.length - 1
        ){
            inputs[index+1].focus();
        }

    });

});

function showError(message){

    document.getElementById(
    'successBox'
    ).style.display='none';

    const errorBox =
    document.getElementById(
    'errorBox'
    );

    errorBox.style.display='block';

    errorBox.innerHTML=
    message;
}

function showSuccess(message){

    const successBox =
    document.getElementById(
    'resendSuccessBox'
    );

    successBox.innerHTML =
    message;

    successBox.style.display =
    'block';

    setTimeout(()=>{

        successBox.style.display =
        'none';

    },1500);
}function showSuccess(message){

    const successBox =
    document.getElementById(
    'resendSuccessBox'
    );

    successBox.innerHTML =
    message;

    successBox.style.display =
    'block';

    setTimeout(()=>{

        successBox.style.display =
        'none';

    },1500);
}

function verifyOTP(){

    let otp='';

    inputs.forEach(input=>{

        otp += input.value;

    });

    if(otp.length !== 6){

        showError(
        'Masukkan 6 digit OTP.'
        );

        return;
    }

    if(otp === "123456"){

        document.getElementById(
        'errorBox'
        ).style.display='none';

        document.getElementById(
        'successBox'
        ).style.display='block';

        setTimeout(()=>{

            window.location.href =
            "login.html";

        },1500);

    }else{

        showError(
        'Kode OTP tidak valid.'
        );
    }
}

let time = 60;
let countdown;

function startTimer(){

    const btn =
    document.getElementById(
    "resendBtn"
    );

    btn.disabled = true;

    btn.classList.remove(
    "active"
    );

    countdown =
    setInterval(()=>{

        const minutes =
        String(
        Math.floor(time/60)
        ).padStart(2,'0');

        const seconds =
        String(
        time%60
        ).padStart(2,'0');

        document.getElementById(
        "timer"
        ).innerHTML =
        `${minutes}:${seconds}`;

        time--;

        if(time < 0){

            clearInterval(
            countdown
            );

            document.getElementById(
            "timer"
            ).innerHTML =
            "00:00";

            btn.disabled = false;

            btn.classList.add(
            "active"
            );
        }

    },1000);

}

startTimer();

document
.getElementById("resendBtn")
.addEventListener("click",()=>{

    const btn =
    document.getElementById(
    "resendBtn"
    );

    if(btn.disabled) return;

    // Notifikasi tampil

    showToast(
    "OTP berhasil dikirim ulang"
    );

    // Reset timer

    time = 60;

    clearInterval(
    countdown
    );

    startTimer();

});

function showToast(message){

    const toast =
    document.getElementById(
    "toastSuccess"
    );

    const toastMessage =
    document.getElementById(
    "toastMessage"
    );

    toastMessage.innerText =
    message;

    toast.classList.add(
    "show"
    );

    setTimeout(()=>{

        toast.classList.remove(
        "show"
        );

    },2000);

}
</script>

</body>
</html>
