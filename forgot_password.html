<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lupa Password - E-Canteen BLU</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

:root{
    --primary:#A1001C;
    --primary-light:#C81D37;
    --background:#F8F7F1;
    --text:#1F2937;
    --muted:#6B7280;
    --border:#E5E7EB;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#2D2D2D;
}

.phone{
    width:390px;
    height:844px;
    background:var(--background);
    overflow:hidden;
    position:relative;
    border-radius:35px;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.header{
    height:130px;

    background:linear-gradient(
    135deg,
    var(--primary),
    var(--primary-light)
    );

    border-bottom-left-radius:40px;
    border-bottom-right-radius:40px;

    position:relative;
}

.header::before{
    content:"";

    position:absolute;

    width:180px;
    height:180px;

    border-radius:50%;

    background:rgba(255,255,255,.08);

    right:-50px;
    top:-50px;
}

.back-btn{
    position:absolute;

    top:50px;
    left:25px;

    width:42px;
    height:42px;

    border:none;

    border-radius:12px;

    background:rgba(255,255,255,.15);

    color:white;

    cursor:pointer;

    font-size:18px;
}

.content{

    min-height:calc(100vh - 150px);

    display:flex;

    justify-content:center;

    align-items:center;

    padding:16px;

    margin-top:-20px;
}

.card{

    width:100%;

    background:white;

    border-radius:24px;

    padding:28px 24px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.06);
}

.title{

    text-align:center;

    margin-bottom:24px;
}

.title h2{

    color:var(--text);

    font-size:28px;

    margin-bottom:6px;
}

.title p{

    color:var(--muted);

    font-size:14px;
}

.form-group{

    margin-bottom:18px;
}

.label{

    display:block;

    margin-bottom:8px;

    font-size:14px;

    font-weight:500;

    color:var(--text);
}

.email-row{

    display:flex;

    gap:10px;
}

.input{

    width:100%;

    height:52px;

    border:1px solid var(--border);

    border-radius:16px;

    padding:0 18px;

    font-size:14px;

    outline:none;

    transition:.3s;
}

.input:focus{

    border-color:var(--primary);
}

.email-row .input{

    flex:1;
}

.otp-btn{

    width:110px;

    height:52px;

    border:none;

    border-radius:16px;

    background:var(--primary);

    color:white;

    font-size:13px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;
}

.otp-btn.disabled{

    background:#D1D5DB;

    color:#6B7280;

    cursor:not-allowed;
}

.input-wrapper{

    position:relative;
}

.password-toggle{

    position:absolute;

    right:18px;
    top:50%;

    transform:translateY(-50%);

    cursor:pointer;

    color:#888;
}

.error-box{

    display:none;

    margin-bottom:18px;

    background:#FFF0F0;

    color:#D62828;

    padding:12px 16px;

    border-radius:12px;

    font-size:13px;
}

.login-btn{

    width:100%;

    height:54px;

    border:none;

    border-radius:18px;

    background:var(--primary);

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    box-shadow:
    0 12px 25px rgba(161,0,28,.2);
}

.success-box{

    position:fixed;

    top:30px;
    left:50%;

    transform:
    translateX(-50%)
    translateY(-20px);

    background:#16A34A;

    color:white;

    padding:14px 20px;

    border-radius:14px;

    display:flex;
    align-items:center;
    gap:10px;

    font-size:14px;
    font-weight:500;

    box-shadow:
    0 10px 25px rgba(22,163,74,.25);

    opacity:0;
    visibility:hidden;

    transition:.3s;

    z-index:9999;
}

.success-box.show{

    opacity:1;

    visibility:visible;

    transform:
    translateX(-50%)
    translateY(0);
}

@media(max-width:420px){

    body{
        background:var(--background);
    }

    .phone{
        width:100%;
        height:100vh;
        border-radius:0;
    }
}

</style>
</head>

<body>

<div id="successBox" class="success-box">

    <i class="bi bi-check-circle-fill"></i>

    <span id="successText"></span>

</div>

<div class="phone">

    <div class="header">

        <button
        class="back-btn"
        onclick="window.location.href='login.html'">

            <i class="bi bi-arrow-left"></i>

        </button>

    </div>

    <div class="content">

        <div class="card">

            <div class="title">

                <h2>Lupa Password</h2>

                <p>
                    Reset password akun E-Canteen BLU
                </p>

            </div>

            <div
            class="error-box"
            id="errorBox">
            </div>

            <div class="form-group">

                <label class="label">
                    Email Mahasiswa
                </label>

                <div class="email-row">

                    <input
                    type="email"
                    id="email"
                    class="input"
                    placeholder="nama@student.budiluhur.ac.id">

                    <button
                    id="otpBtn"
                    class="otp-btn"
                    onclick="sendOTP()">

                        Kirim OTP

                    </button>

                </div>

            </div>

            <div class="form-group">

                <label class="label">
                    Kode OTP
                </label>

                <input
                type="text"
                id="otp"
                class="input"
                placeholder="Masukkan kode OTP">

            </div>

            <div class="form-group">

                <label class="label">
                    Password Baru
                </label>

                <div class="input-wrapper">

                    <input
                    type="password"
                    id="password"
                    class="input"
                    placeholder="Minimal 8 karakter">

                    <span
                    class="password-toggle"
                    onclick="togglePassword('password','eye1')">

                        <i
                        class="bi bi-eye"
                        id="eye1"></i>

                    </span>

                </div>

            </div>

            <div class="form-group">

                <label class="label">
                    Konfirmasi Password
                </label>

                <div class="input-wrapper">

                    <input
                    type="password"
                    id="confirmPassword"
                    class="input"
                    placeholder="Ulangi password">

                    <span
                    class="password-toggle"
                    onclick="togglePassword('confirmPassword','eye2')">

                        <i
                        class="bi bi-eye"
                        id="eye2"></i>

                    </span>

                </div>

            </div>

            <button
            class="login-btn"
            onclick="resetPassword()">

                Simpan Password Baru

            </button>

        </div>

    </div>

</div>
<script>

let otpTimer = 60;
let countdown;

function showSuccess(message){

    const box =
    document.getElementById(
    "successBox"
    );

    document.getElementById(
    "successText"
    ).innerText = message;

    box.classList.add(
    "show"
    );

    setTimeout(()=>{

        box.classList.remove(
        "show"
        );

    },2000);
}

function showError(message){

    const errorBox =
    document.getElementById(
    "errorBox"
    );

    errorBox.style.display =
    "block";

    errorBox.innerHTML =
    message;
}

function hideError(){

    document.getElementById(
    "errorBox"
    ).style.display =
    "none";
}

function togglePassword(
    inputId,
    iconId
){

    const input =
    document.getElementById(
    inputId
    );

    const icon =
    document.getElementById(
    iconId
    );

    if(input.type === "password"){

        input.type = "text";

        icon.classList.remove(
        "bi-eye"
        );

        icon.classList.add(
        "bi-eye-slash"
        );

    }else{

        input.type = "password";

        icon.classList.remove(
        "bi-eye-slash"
        );

        icon.classList.add(
        "bi-eye"
        );
    }
}

function startTimer(){

    const btn =
    document.getElementById(
    "otpBtn"
    );

    btn.disabled = true;

    btn.classList.add(
    "disabled"
    );

    countdown =
    setInterval(()=>{

        btn.innerHTML =
        otpTimer + "s";

        otpTimer--;

        if(otpTimer < 0){

            clearInterval(
            countdown
            );

            btn.disabled = false;

            btn.classList.remove(
            "disabled"
            );

            btn.innerHTML =
            "Kirim OTP";
        }

    },1000);
}

function sendOTP(){

    const email =
    document.getElementById(
    "email"
    )
    .value
    .trim()
    .toLowerCase();

    if(email === ""){

        showError(
        "Email mahasiswa wajib diisi."
        );

        return;
    }

    if(
        !email.endsWith(
        "@student.budiluhur.ac.id"
        )
    ){

        showError(
        "Gunakan email mahasiswa dengan domain @student.budiluhur.ac.id"
        );

        return;
    }

    hideError();

    showSuccess(
    "OTP berhasil dikirim"
    );

    otpTimer = 60;

    clearInterval(
    countdown
    );

    startTimer();
}

function resetPassword(){

    const email =
    document.getElementById(
    "email"
    )
    .value
    .trim()
    .toLowerCase();

    const otp =
    document.getElementById(
    "otp"
    )
    .value
    .trim();

    const password =
    document.getElementById(
    "password"
    )
    .value;

    const confirmPassword =
    document.getElementById(
    "confirmPassword"
    )
    .value;

    if(email === ""){

        showError(
        "Email mahasiswa wajib diisi."
        );

        return;
    }

    if(
        !email.endsWith(
        "@student.budiluhur.ac.id"
        )
    ){

        showError(
        "Gunakan email mahasiswa dengan domain @student.budiluhur.ac.id"
        );

        return;
    }

    if(otp === ""){

        showError(
        "Kode OTP wajib diisi."
        );

        return;
    }

    // Dummy OTP

    if(otp !== "654321"){

        showError(
        "Kode OTP tidak valid."
        );

        return;
    }

    if(password === ""){

        showError(
        "Password baru wajib diisi."
        );

        return;
    }

    if(password.length < 8){

        showError(
        "Password minimal 8 karakter."
        );

        return;
    }

    if(confirmPassword === ""){

        showError(
        "Konfirmasi password wajib diisi."
        );

        return;
    }

    if(password !== confirmPassword){

        showError(
        "Konfirmasi password tidak cocok."
        );

        return;
    }

    hideError();

    showSuccess(
    "Password berhasil diperbarui"
    );

    setTimeout(()=>{

        window.location.href =
        "login.html";

    },1500);
}

document
.getElementById("email")
.addEventListener(
"input",
hideError
);

document
.getElementById("otp")
.addEventListener(
"input",
hideError
);

document
.getElementById("password")
.addEventListener(
"input",
hideError
);

document
.getElementById("confirmPassword")
.addEventListener(
"input",
hideError
);

</script>

</body>
</html>
